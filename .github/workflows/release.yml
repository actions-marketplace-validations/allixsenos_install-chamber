name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  update-floating-tags:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Update floating version tags
        env:
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          SHA=$(git rev-list -n 1 "${TAG}")

          git tag -f "v${MAJOR}" "${SHA}"
          git push origin "v${MAJOR}" --force

          git tag -f "v${MAJOR}.${MINOR}" "${SHA}"
          git push origin "v${MAJOR}.${MINOR}" --force
